<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Are Loved</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>You Are Loved</h1>
    <p class="subtitle"><span class="line"></span> A place for your memories <span class="line"></span></p>

    <div class="header-actions">
      <button class="secondary-btn" id="refreshBtn" type="button">Refresh Gallery</button>
      <label class="upload-btn" id="uploadLabel">
        Upload Photos
        <input type="file" id="fileInput" accept="image/*" multiple hidden />
      </label>
    </div>
  </header>

  <div id="uploadProgress" class="upload-progress hidden">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p id="progressText">Uploading…</p>
  </div>

  <main id="gallery" class="gallery"></main>

  <div class="gallery-actions">
    <button id="loadMoreBtn" class="secondary-btn hidden" type="button">Load More</button>
  </div>

  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightboxClose">&#x2715;</button>
    <img id="lightboxImg" src="" alt="Photo" />
    <button class="lightbox-delete" id="lightboxDelete">&#x1F5D1; Delete</button>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
